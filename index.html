<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     ATLAS — a centered "presence" console. The orb is the anchor;
     the conversation flows beneath it; history is a slide-over.
     One light source, near-monochrome, robust on every screen.
     ============================================================ */
  :root {
    --bg:#0A0C10; --panel:#0E1116; --raised:#161A21;
    --ink:#F3F5F8; --muted:#98A0AC; --faint:#585F69;
    --line:rgba(255,255,255,0.07); --line-2:rgba(255,255,255,0.13);
    --glow:#AEC8FF; --glow-dim:rgba(174,200,255,0.16);
    --danger:#E89B7A;
    --display:"Inter Tight",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
    --shadow:0 24px 60px -24px rgba(0,0,0,0.85);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);
    overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  ::selection{background:rgba(174,200,255,0.25)}

  .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(70% 45% at 50% 0%, rgba(174,200,255,0.09), transparent 60%),
      radial-gradient(120% 120% at 50% 120%, rgba(0,0,0,0.5), transparent 50%)}

  /* ---- signature: the orb ---- */
  .orb{--d:24px;width:var(--d);height:var(--d);border-radius:50%;position:relative;flex:0 0 auto;
    background:radial-gradient(circle at 38% 30%, #fff 0%, #d6e3ff 20%, #89a9ec 52%, #36507f 80%, #1b2c49 100%);
    box-shadow:0 0 calc(var(--d)*0.9) calc(var(--d)*-0.25) var(--glow-dim), inset 0 0 calc(var(--d)*0.5) rgba(255,255,255,0.22);
    animation:breathe 4.6s ease-in-out infinite}
  .orb.ring::after{content:"";position:absolute;inset:calc(var(--d)*-0.3);border-radius:50%;
    border:1px solid var(--glow-dim);animation:spin 22s linear infinite}
  @keyframes breathe{0%,100%{box-shadow:0 0 calc(var(--d)*0.9) calc(var(--d)*-0.25) var(--glow-dim), inset 0 0 calc(var(--d)*0.5) rgba(255,255,255,0.22)}
    50%{box-shadow:0 0 calc(var(--d)*1.3) calc(var(--d)*-0.15) rgba(174,200,255,0.34), inset 0 0 calc(var(--d)*0.5) rgba(255,255,255,0.3)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============================================================
     LAYOUT — single robust flex column, centered content
     ============================================================ */
  .app{position:relative;z-index:1;height:100vh;height:100dvh;display:flex;flex-direction:column}

  .bar{flex:0 0 auto;height:62px;display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .orb{--d:22px}
  .brand .name{font-family:var(--display);font-weight:600;font-size:19px;letter-spacing:-0.2px}
  .brand .stat{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
    border:1px solid var(--line-2);border-radius:100px;padding:4px 10px;margin-left:4px}
  .brand .stat .d{width:5px;height:5px;border-radius:50%;background:var(--glow);box-shadow:0 0 7px var(--glow)}
  .controls{display:flex;align-items:center;gap:8px}
  .ico{width:38px;height:38px;border-radius:11px;border:1px solid var(--line-2);background:transparent;
    color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:background .15s,color .15s,border-color .15s}
  .ico:hover{background:var(--raised);color:var(--ink);border-color:rgba(255,255,255,0.2)}
  .ico:focus-visible{outline:2px solid var(--glow);outline-offset:2px}
  .ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .scroll{flex:1 1 auto;min-height:0;overflow-y:auto;display:flex;flex-direction:column}
  .scroll::-webkit-scrollbar{width:10px}
  .scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:10px}

  /* hero / empty state */
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 20px;gap:30px;position:relative}
  .horizon{position:absolute;left:0;right:0;top:calc(50% - 70px);height:1px;pointer-events:none;
    background:linear-gradient(90deg,transparent,var(--glow-dim) 35%,rgba(174,200,255,0.3) 50%,var(--glow-dim) 65%,transparent)}
  .hero .orb{--d:62px;z-index:1}
  .hero h1{font-family:var(--display);font-weight:500;font-size:38px;letter-spacing:-0.6px;text-align:center;z-index:1}
  .hero-composer{width:100%;max-width:720px;z-index:1}
  .chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:560px;z-index:1}
  .chip{font-size:13.5px;color:var(--muted);background:var(--raised);border:1px solid var(--line);
    padding:9px 16px;border-radius:100px;cursor:pointer;transition:border-color .15s,color .15s}
  .chip:hover{border-color:var(--line-2);color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--glow);outline-offset:2px}
  .hero>*{animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
  .hero .orb{animation:breathe 4.6s ease-in-out infinite, rise .8s cubic-bezier(.2,.7,.2,1) both}
  .hero>*:nth-child(3){animation-delay:.08s}
  .hero>*:nth-child(4){animation-delay:.16s}
  .hero>*:nth-child(5){animation-delay:.24s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* conversation */
  .conv{display:none;width:100%;max-width:760px;margin:0 auto;padding:30px 20px 16px}
  .app.chatting .hero{display:none}
  .app.chatting .conv{display:block}
  .msg{margin-bottom:30px;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}}
  .msg.atlas{display:flex;gap:15px}
  .msg.atlas .av{margin-top:3px}
  .msg.atlas .av .orb{--d:22px}
  .msg.atlas .body{font-size:15.5px;line-height:1.78;color:var(--ink);word-wrap:break-word}
  .msg.atlas .body>*:first-child{margin-top:0}
  .msg.atlas .body>*:last-child{margin-bottom:0}
  .msg.atlas .body p{margin:0 0 12px}
  .msg.atlas .body ul,.msg.atlas .body ol{margin:0 0 12px;padding-left:22px}
  .msg.atlas .body li{margin:4px 0}
  .msg.atlas .body h1,.msg.atlas .body h2,.msg.atlas .body h3{font-family:var(--display);font-weight:600;line-height:1.3;margin:18px 0 8px}
  .msg.atlas .body h1{font-size:21px}.msg.atlas .body h2{font-size:18px}.msg.atlas .body h3{font-size:16px}
  .msg.atlas .body strong{font-weight:600;color:#fff}
  .msg.atlas .body a{color:var(--glow);text-decoration:underline;text-underline-offset:2px}
  .msg.atlas .body code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;
    background:rgba(255,255,255,0.07);border:1px solid var(--line);border-radius:6px;padding:1px 6px}
  .msg.atlas .body pre{margin:0 0 12px;background:#0C0F14;border:1px solid var(--line-2);border-radius:12px;padding:14px 16px;overflow-x:auto}
  .msg.atlas .body pre code{background:none;border:none;padding:0;font-size:13px;line-height:1.6}
  .msg.atlas .body blockquote{margin:0 0 12px;padding:4px 0 4px 14px;border-left:2px solid var(--line-2);color:var(--muted)}
  .msg.atlas .body hr{border:none;border-top:1px solid var(--line);margin:16px 0}
  .msg.atlas .body table{border-collapse:collapse;margin:0 0 12px;font-size:14px;display:block;overflow-x:auto}
  .msg.atlas .body th,.msg.atlas .body td{border:1px solid var(--line-2);padding:7px 11px;text-align:left}
  .msg.atlas .body th{background:rgba(255,255,255,0.04)}
  .msg.user{display:flex;justify-content:flex-end}
  .msg.user .bubble{background:var(--raised);border:1px solid var(--line);border-radius:18px 18px 5px 18px;
    padding:12px 18px;font-size:15.5px;line-height:1.6;max-width:78%;white-space:pre-wrap;word-wrap:break-word}
  .thinking{display:flex;gap:15px;align-items:center;margin-bottom:30px}
  .thinking .orb{--d:22px;animation-duration:2.2s}
  .thinking .caret{width:7px;height:17px;border-radius:2px;background:var(--muted);animation:blink 1.1s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.18}50%{opacity:.65}}

  /* bottom composer dock */
  .bottom{flex:0 0 auto;display:none;padding:8px 20px 22px}
  .app.chatting .bottom{display:block}
  .composer{width:100%;max-width:760px;margin:0 auto}
  .field{display:flex;align-items:flex-end;gap:8px;background:var(--raised);border:1px solid var(--line-2);
    border-radius:22px;padding:9px 9px 9px 18px;box-shadow:var(--shadow);transition:border-color .18s}
  .field:focus-within{border-color:rgba(174,200,255,0.5)}
  textarea{flex:1;resize:none;border:none;outline:none;background:transparent;color:var(--ink);
    font-family:var(--body);font-size:15.5px;line-height:1.5;max-height:200px;padding:9px 0;overflow-y:hidden}
  textarea::placeholder{color:var(--faint)}
  .send{width:38px;height:38px;flex:0 0 auto;border:none;border-radius:50%;background:var(--ink);
    color:#0A0C10;cursor:pointer;display:grid;place-items:center;transition:transform .12s,opacity .16s}
  .send:hover{transform:translateY(-1px)}
  .send:focus-visible{outline:2px solid var(--glow);outline-offset:3px}
  .send:disabled{opacity:.28;cursor:not-allowed;transform:none}
  .send svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .tool{width:36px;height:36px;flex:0 0 auto;border:none;border-radius:50%;background:transparent;color:var(--muted);
    cursor:pointer;display:grid;place-items:center;transition:background .15s,color .15s}
  .tool:hover{background:rgba(255,255,255,0.06);color:var(--ink)}
  .tool:focus-visible{outline:2px solid var(--glow);outline-offset:2px}
  .tool svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tool.active{background:rgba(174,200,255,0.16);color:var(--glow)}
  .tool.listening{background:rgba(255,130,120,0.18);color:#ff9a8c;animation:micpulse 1.3s ease-in-out infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,130,120,0.4)}50%{box-shadow:0 0 0 7px rgba(255,130,120,0)}}
  .ico.active{background:rgba(174,200,255,0.16);color:var(--glow);border-color:transparent}
  .attach-row{display:flex;flex-wrap:wrap;gap:8px;padding:0 4px 8px}
  .attach-row:empty{display:none}
  .apreview{display:flex;align-items:center;gap:8px;background:var(--raised);border:1px solid var(--line-2);
    border-radius:11px;padding:6px 8px 6px 6px;max-width:240px}
  .apreview img{width:34px;height:34px;border-radius:7px;object-fit:cover;flex:0 0 auto}
  .apreview .an{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .apreview .ax{border:none;background:none;color:var(--faint);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;flex:0 0 auto}
  .apreview .ax:hover{color:var(--ink)}
  .msg.user .bubble .umg{display:block;max-width:260px;max-height:260px;border-radius:11px;margin-bottom:8px}
  .msg.user .bubble .filechip{font-size:13px;color:var(--muted);background:rgba(255,255,255,0.05);
    border:1px solid var(--line);border-radius:9px;padding:7px 11px;margin-bottom:8px;display:inline-block}
  .undertext{text-align:center;font-size:11.5px;color:var(--faint);margin-top:11px}

  /* ---- history slide-over (right) ---- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:39;opacity:0;pointer-events:none;transition:opacity .22s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;height:100dvh;width:320px;max-width:86vw;z-index:40;
    background:var(--panel);border-left:1px solid var(--line);box-shadow:var(--shadow);
    transform:translateX(100%);transition:transform .24s cubic-bezier(.2,.7,.2,1);
    display:flex;flex-direction:column;padding:18px 14px}
  .drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 16px}
  .drawer-head .t{font-family:var(--display);font-weight:600;font-size:16px}
  .new-chat{display:flex;align-items:center;gap:10px;width:100%;font-family:var(--body);font-size:14px;
    font-weight:500;color:var(--ink);background:var(--raised);border:1px solid var(--line-2);border-radius:12px;
    padding:11px 14px;cursor:pointer;transition:background .16s,border-color .16s}
  .new-chat:hover{background:#1C2129;border-color:rgba(255,255,255,0.2)}
  .new-chat svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
  .recent{margin-top:22px;flex:1;overflow-y:auto}
  .recent .h{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);padding:0 10px 10px}
  .ritem{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--muted);padding:9px 10px;
    border-radius:9px;cursor:pointer;transition:background .14s,color .14s}
  .ritem .tt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ritem:hover{background:rgba(255,255,255,0.04);color:var(--ink)}
  .ritem.active{background:rgba(255,255,255,0.055);color:var(--ink)}
  .ritem .del{opacity:0;border:none;background:none;color:var(--faint);cursor:pointer;font-size:17px;
    line-height:1;padding:2px 5px;border-radius:6px;flex:0 0 auto}
  .ritem:hover .del{opacity:1}
  .ritem .del:hover{color:var(--ink);background:rgba(255,255,255,0.08)}
  .rempty{font-size:12.5px;color:var(--faint);padding:6px 10px}
  .memory{border-top:1px solid var(--line);padding-top:12px;margin-top:8px}
  .memory .h{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);padding:0 2px 8px}
  .memory textarea{width:100%;resize:none;height:76px;background:var(--raised);border:1px solid var(--line-2);
    border-radius:11px;color:var(--ink);font-family:var(--body);font-size:13px;line-height:1.45;padding:9px 11px;outline:none}
  .memory textarea:focus{border-color:rgba(174,200,255,0.5)}
  .memory textarea::placeholder{color:var(--faint)}
  .memhint{font-size:10.5px;color:var(--faint);padding:6px 2px 0}
  .drawer-foot{border-top:1px solid var(--line);padding-top:12px;margin-top:8px}
  .profile{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:11px}
  .pfp{width:30px;height:30px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 38% 30%, #fff, #aebfe0 60%, #5d6f93);color:#10141c;
    display:grid;place-items:center;font-size:12px;font-weight:700}
  .profile .n{font-size:13px;font-weight:500}
  .profile .p{font-size:11px;color:var(--faint)}

  @media (max-width:560px){ .hero h1{font-size:29px} .brand .stat{display:none} }
  @media (prefers-reduced-motion: reduce){
    .orb,.orb.ring::after,.hero>*,.hero .orb,.msg,.tool.listening{animation:none !important}
    .drawer,.scrim{transition:none !important}
  }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div class="ambient"></div>

  <div class="app" id="app">
    <header class="bar">
      <div class="brand">
        <span class="orb ring"></span>
        <span class="name">Atlas</span>
        <span class="stat"><span class="d"></span>Gemini</span>
      </div>
      <div class="controls">
        <button class="ico" id="voiceBtn" aria-label="Read replies aloud" title="Read replies aloud">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
        </button>
        <button class="ico" id="newBtn" aria-label="New chat" title="New chat">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="ico" id="histBtn" aria-label="History" title="History">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/><polyline points="12 8 12 12 15 14"/></svg>
        </button>
      </div>
    </header>

    <div class="scroll" id="scroll">
      <div class="hero" id="hero">
        <div class="horizon"></div>
        <span class="orb ring"></span>
        <h1 id="greeting">Good evening.</h1>
        <div class="hero-composer" id="heroSlot"></div>
        <div class="chips">
          <div class="chip" tabindex="0" data-prompt="Explain a concept I've always found confusing, in plain terms.">Explain a concept</div>
          <div class="chip" tabindex="0" data-prompt="Help me write something. I'll tell you what next.">Help me write</div>
          <div class="chip" tabindex="0" data-prompt="Help me debug some code. I'll paste it next.">Debug code</div>
          <div class="chip" tabindex="0" data-prompt="Brainstorm some ideas with me.">Brainstorm</div>
        </div>
      </div>
      <div class="conv" id="conv"></div>
    </div>

    <div class="bottom"><div id="dockSlot"></div></div>
  </div>

  <!-- history slide-over -->
  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-label="History">
    <div class="drawer-head">
      <span class="t">History</span>
      <button class="ico" id="closeBtn" aria-label="Close" style="width:32px;height:32px;border-radius:9px">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="new-chat" id="newChat">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>
    <div class="recent">
      <div class="h">Recent</div>
      <div id="recentList"></div>
    </div>
    <div class="memory">
      <div class="h">Memory</div>
      <textarea id="memText" placeholder="What should Atlas always remember? Your name, what you build, how you like answers..."></textarea>
      <div class="memhint">Saved automatically · applies to every chat</div>
    </div>
    <div class="drawer-foot">
      <div class="profile">
        <div class="pfp">B</div>
        <div><div class="n">Beast</div><div class="p">Free plan</div></div>
      </div>
    </div>
  </aside>

  <template id="composerTpl">
    <div class="composer" id="composer">
      <div id="attachRow" class="attach-row"></div>
      <div class="field">
        <button class="tool" id="attachBtn" aria-label="Attach image or PDF" title="Attach image or PDF">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg>
        </button>
        <textarea id="input" rows="1" placeholder="Ask Atlas anything"></textarea>
        <button class="tool" id="micBtn" aria-label="Speak" title="Speak">
          <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="tool" id="searchBtn" aria-label="Toggle web search" title="Web search">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        </button>
        <button class="send" id="send" aria-label="Send message">
          <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*,application/pdf" hidden />
      <div class="undertext">Atlas can make mistakes. Check important info. Session memory only.</div>
    </div>
  </template>

<script>
/* ===== Atlas front end. Talks to /api/chat (your Gemini proxy). ===== */
const ORB = '<span class="orb"></span>';
const app=document.getElementById('app'), conv=document.getElementById('conv'),
      scroll=document.getElementById('scroll'), heroSlot=document.getElementById('heroSlot'),
      dockSlot=document.getElementById('dockSlot');

heroSlot.appendChild(document.getElementById('composerTpl').content.cloneNode(true));
let input=document.getElementById('input'), sendBtn=document.getElementById('send');
const attachBtn=document.getElementById('attachBtn'), searchBtn=document.getElementById('searchBtn'),
      fileInput=document.getElementById('fileInput'), micBtn=document.getElementById('micBtn'),
      voiceBtn=document.getElementById('voiceBtn');
let history=[], busy=false, chatting=false, pendingFile=null, searchOn=false;

/* ===== memory: save chats to the browser so they survive a refresh ===== */
let currentId=null;
const LS='atlas.chats';
function loadChats(){ try{ return JSON.parse(localStorage.getItem(LS))||[]; }catch(e){ return []; } }
function saveChats(a){ try{ localStorage.setItem(LS, JSON.stringify(a)); }catch(e){} }
function persist(){
  if(!history.length) return;
  try{
    const chats=loadChats();
    const first=history.find(m=>m.role==='user');
    const title=((first&&first.content)||(first&&first.file&&(first.file.name||'Attachment'))||'New chat').slice(0,42);
    if(!currentId) currentId=Date.now().toString(36);
    // strip heavy file bytes before saving so we don't blow the browser's storage limit
    const safe=history.map(m=> m.file
      ? {role:m.role,content:m.content,file:{name:m.file.name,mime_type:m.file.mime_type}}
      : m);
    const rec={id:currentId,title,messages:safe,updated:Date.now()};
    const i=chats.findIndex(c=>c.id===currentId);
    if(i>=0) chats[i]=rec; else chats.unshift(rec);
    chats.sort((a,b)=>b.updated-a.updated);
    saveChats(chats.slice(0,50));
    renderRecents();
  }catch(e){}
}
function renderRecents(){
  const list=document.getElementById('recentList'); if(!list) return;
  const chats=loadChats();
  if(!chats.length){ list.innerHTML='<div class="rempty">No saved chats yet.</div>'; return; }
  list.innerHTML='';
  chats.forEach(c=>{
    const row=document.createElement('div'); row.className='ritem'+(c.id===currentId?' active':'');
    const tt=document.createElement('span'); tt.className='tt'; tt.textContent=c.title||'Untitled';
    const del=document.createElement('button'); del.className='del'; del.textContent='\u00D7'; del.title='Delete';
    row.appendChild(tt); row.appendChild(del);
    row.addEventListener('click',e=>{ if(e.target===del) return; openChat(c.id); });
    del.addEventListener('click',e=>{ e.stopPropagation(); deleteChat(c.id); });
    list.appendChild(row);
  });
}
function rebuildConv(){
  conv.innerHTML='';
  history.forEach(m=>{ if(m.role==='user') addUser(m.content, m.file); else addAtlas(m.content); });
  scroll.scrollTop=scroll.scrollHeight;
}
function openChat(id){
  const rec=loadChats().find(c=>c.id===id); if(!rec) return;
  currentId=id; history=rec.messages.slice();
  chatting=true; app.classList.add('chatting');
  dockSlot.appendChild(document.getElementById('composer'));
  rebuildConv(); renderRecents(); closeDrawer(); input.focus();
}
function deleteChat(id){
  saveChats(loadChats().filter(c=>c.id!==id));
  if(id===currentId) newChat(); else renderRecents();
}

(function(){ const h=new Date().getHours();
  document.getElementById('greeting').textContent =
    h<5?"Still up?":h<12?"Good morning.":h<18?"Good afternoon.":"Good evening."; })();

function moveComposerToBottom(){ if(chatting) return;
  chatting=true; app.classList.add('chatting');
  dockSlot.appendChild(document.getElementById('composer')); input.focus(); }
function addUser(t, file){ const e=document.createElement('div'); e.className='msg user';
  const b=document.createElement('div'); b.className='bubble';
  if(file){
    if(file.data && file.mime_type && file.mime_type.indexOf('image/')===0){
      const img=document.createElement('img'); img.className='umg';
      img.src='data:'+file.mime_type+';base64,'+file.data; b.appendChild(img);
    } else {
      const chip=document.createElement('div'); chip.className='filechip';
      chip.textContent=(file.name||'Attachment'); b.appendChild(chip);
    }
  }
  if(t){ const tx=document.createElement('div'); tx.textContent=t; b.appendChild(tx); }
  e.appendChild(b); conv.appendChild(e); scroll.scrollTop=scroll.scrollHeight; }
function renderInto(body, t){
  try{
    if(window.marked && window.DOMPurify){
      body.innerHTML = DOMPurify.sanitize(marked.parse(t, {breaks:true}));
      if(window.hljs) body.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
      body.querySelectorAll('a').forEach(a=>{ a.target='_blank'; a.rel='noopener noreferrer'; });
      return;
    }
  }catch(e){}
  body.textContent = t;   // safe fallback if a library didn't load
}
function addAtlas(t){ const e=document.createElement('div'); e.className='msg atlas';
  e.innerHTML='<div class="av">'+ORB+'</div><div class="body"></div>';
  const body=e.querySelector('.body'); renderInto(body, t);
  conv.appendChild(e); scroll.scrollTop=scroll.scrollHeight; return body; }
function showThinking(){ const e=document.createElement('div'); e.className='thinking'; e.id='thinking';
  e.innerHTML=ORB+'<span class="caret"></span>';
  conv.appendChild(e); scroll.scrollTop=scroll.scrollHeight; }
function clearThinking(){ const t=document.getElementById('thinking'); if(t) t.remove(); }

/* types the reply out live, then swaps in formatted markdown */
function typeAtlas(text){
  return new Promise(resolve=>{
    const e=document.createElement('div'); e.className='msg atlas';
    e.innerHTML='<div class="av">'+ORB+'</div><div class="body"></div>';
    const body=e.querySelector('.body'); conv.appendChild(e);
    const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce || !text){ renderInto(body,text); scroll.scrollTop=scroll.scrollHeight; return resolve(); }
    let i=0;
    (function step(){
      i+=3; body.textContent=text.slice(0,i);
      scroll.scrollTop=scroll.scrollHeight;
      if(i<text.length){ setTimeout(step,12); }
      else { renderInto(body,text); scroll.scrollTop=scroll.scrollHeight; resolve(); }
    })();
  });
}

/* ===== brain — calls your proxy at /api/chat ===== */
async function askBrain(history){
  let memory=''; try{ memory=localStorage.getItem('atlas.memory')||''; }catch(e){}
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:history, memory, search:searchOn})});
  if(!res.ok) throw new Error('offline');
  const data=await res.json(); return data.reply;
}

async function send(){
  const text=input.value.trim(); if((!text && !pendingFile)||busy) return;
  busy=true; sendBtn.disabled=true;
  if('speechSynthesis' in window) speechSynthesis.cancel();
  moveComposerToBottom();
  const file=pendingFile;
  addUser(text, file);
  history.push(file ? {role:'user',content:text,file} : {role:'user',content:text});
  clearAttach(); input.value=''; autosize(); showThinking();
  try{ const reply=await askBrain(history); clearThinking();
    await typeAtlas(reply||"Came back empty on that one. Say it another way?");
    history.push({role:'assistant',content:reply}); persist(); speak(reply);
  }catch(e){ clearThinking();
    addAtlas("Lost the signal reaching my brain. Check the connection and try again.").style.color='var(--danger)';
    persist();
  }finally{ busy=false; sendBtn.disabled=false; input.focus(); }
}
function autosize(){ input.style.height='auto'; const h=Math.min(input.scrollHeight,200);
  input.style.height=h+'px'; input.style.overflowY=input.scrollHeight>200?'auto':'hidden'; }
input.addEventListener('input', autosize);
input.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }});
sendBtn.addEventListener('click', send);
document.querySelectorAll('.chip').forEach(c=>{
  const fill=()=>{ input.value=c.dataset.prompt; autosize(); input.focus(); };
  c.addEventListener('click', fill);
  c.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fill(); }});
});

function newChat(){ currentId=null; history=[]; conv.innerHTML=''; chatting=false; app.classList.remove('chatting');
  heroSlot.appendChild(document.getElementById('composer')); input.value=''; autosize();
  renderRecents(); closeDrawer(); input.focus(); }
function readFile(file){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
function renderAttachPreview(f){
  const row=document.getElementById('attachRow'); row.innerHTML='';
  const chip=document.createElement('div'); chip.className='apreview';
  if(f.mime_type.indexOf('image/')===0){ const img=document.createElement('img');
    img.src='data:'+f.mime_type+';base64,'+f.data; chip.appendChild(img); }
  const nm=document.createElement('span'); nm.className='an'; nm.textContent=f.name; chip.appendChild(nm);
  const x=document.createElement('button'); x.className='ax'; x.textContent='\u00D7'; x.title='Remove';
  x.addEventListener('click', clearAttach); chip.appendChild(x);
  row.appendChild(chip);
}
function clearAttach(){ pendingFile=null; const r=document.getElementById('attachRow'); if(r) r.innerHTML=''; }

attachBtn.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', async ()=>{
  const f=fileInput.files[0]; fileInput.value='';
  if(!f) return;
  if(f.size > 8*1024*1024){ alert('That file is too big — please keep it under 8MB.'); return; }
  try{ const data=await readFile(f);
    pendingFile={name:f.name, mime_type:f.type||'application/octet-stream', data};
    renderAttachPreview(pendingFile); input.focus();
  }catch(e){ alert("Couldn't read that file. Try another one."); }
});
searchBtn.addEventListener('click', ()=>{ searchOn=!searchOn; searchBtn.classList.toggle('active', searchOn); });

/* ===== voice: talk to Atlas (speech-to-text) and hear it (text-to-speech) ===== */
// 1) Speech-to-text via the browser's speech recognition.
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null, listening=false;
if(SR){
  recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=false;
  recog.onresult=(e)=>{ let t=''; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript;
    input.value=t; autosize(); };
  recog.onend=()=>{ listening=false; micBtn.classList.remove('listening'); input.focus(); };
  recog.onerror=()=>{ listening=false; micBtn.classList.remove('listening'); };
  micBtn.addEventListener('click', ()=>{
    if(listening){ recog.stop(); return; }
    try{ input.value=''; recog.start(); listening=true; micBtn.classList.add('listening'); }catch(e){}
  });
} else { micBtn.style.display='none'; }   // hide if the browser can't listen

// 2) Text-to-speech: read Atlas's replies aloud when toggled on.
let speakOn=false; try{ speakOn=localStorage.getItem('atlas.voice')==='1'; }catch(e){}
const canSpeak = 'speechSynthesis' in window;
if(canSpeak){ voiceBtn.classList.toggle('active', speakOn); }
else { voiceBtn.style.display='none'; }
voiceBtn.addEventListener('click', ()=>{
  speakOn=!speakOn; voiceBtn.classList.toggle('active', speakOn);
  try{ localStorage.setItem('atlas.voice', speakOn?'1':'0'); }catch(e){}
  if(!speakOn && canSpeak) speechSynthesis.cancel();
});
function cleanForSpeech(t){
  return String(t).replace(/```[\s\S]*?```/g,' (code) ').replace(/`([^`]+)`/g,'$1')
    .replace(/!\[[^\]]*\]\([^)]*\)/g,'').replace(/\[([^\]]+)\]\([^)]*\)/g,'$1')
    .replace(/[#>*_~|]/g,'').replace(/\n{2,}/g,'. ').trim();
}
function speak(t){
  if(!speakOn || !canSpeak || !t) return;
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(cleanForSpeech(t).slice(0,2000));
    u.lang='en-US'; u.rate=1.0; u.pitch=1.0;
    const vs=speechSynthesis.getVoices();
    const v=vs.find(v=>/en[-_]US/i.test(v.lang)&&/Google|Natural|Samantha|Aaron/i.test(v.name))
          || vs.find(v=>/^en/i.test(v.lang));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}

document.getElementById('newBtn').addEventListener('click', newChat);
document.getElementById('newChat').addEventListener('click', newChat);

/* history slide-over */
const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
function openDrawer(){ drawer.classList.add('open'); scrim.classList.add('show'); }
function closeDrawer(){ drawer.classList.remove('open'); scrim.classList.remove('show'); }
document.getElementById('histBtn').addEventListener('click', openDrawer);
document.getElementById('closeBtn').addEventListener('click', closeDrawer);
scrim.addEventListener('click', closeDrawer);
addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });

const memText=document.getElementById('memText');
try{ memText.value=localStorage.getItem('atlas.memory')||''; }catch(e){}
memText.addEventListener('input',()=>{ try{ localStorage.setItem('atlas.memory', memText.value); }catch(e){} });

renderRecents();
input.focus();
</script>
